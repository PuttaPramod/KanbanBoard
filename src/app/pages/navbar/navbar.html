<nav class="navbar" role="navigation" aria-label="Main navigation" [class.logged-out]="!isLoggedIn()" [class.search-active]="searchActive()">
  <div class="nav-container">
    <!-- LEFT: Logo + Brand -->
    <div class="nav-left">
      <a routerLink="/dashboard"
         class="logo"
         (click)="closeMenu()"
         aria-label="TaskFlow Dashboard"
         *ngIf="isLoggedIn()">
        <span class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="logo-text">TaskFlow</span>
      </a>
      <a routerLink="/login"
         class="logo"
         (click)="closeMenu()"
         aria-label="TaskFlow Homepage"
         *ngIf="!isLoggedIn()">
        <span class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="logo-text">TaskFlow</span>
      </a>
    </div>

    <!-- CENTER: Navigation Links (Desktop) -->
    <div class="nav-center" *ngIf="isLoggedIn()">
      <a routerLink="/dashboard"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }"
         class="nav-link">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a routerLink="/tasks"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }"
         class="nav-link">
        <span class="nav-icon">✓</span>
        <span class="nav-label">Tasks</span>
      </a>
    </div>

    

    <!-- RIGHT: Desktop Actions -->
    <div class="nav-right" *ngIf="isLoggedIn()">
      
      <button class="logout-btn desktop-logout"
              aria-label="Sign out from your account"
              title="Logout"
              (click)="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Logout</span>
      </button>
    </div>

    <!-- RIGHT: Auth Links (Not logged in) -->
    <div class="nav-right" *ngIf="!isLoggedIn()">
      <a routerLink="/login" class="auth-link sign-in">Sign In</a>
      <a routerLink="/register" class="auth-link sign-up">Sign Up</a>
    </div>

    <!-- HAMBURGER (Mobile) -->
    <button class="hamburger"
            (click)="toggleMenu()"
            [attr.aria-expanded]="menuOpen"
            aria-controls="nav-menu"
            aria-label="Toggle navigation menu"
            #hamburgerBtn
            [class.active]="menuOpen">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>

  <!-- MOBILE MENU -->
  <div class="nav-mobile-menu"
       id="nav-menu"
       [class.open]="menuOpen"
       role="menubar"
       #navMenu>
    <div class="mobile-menu-header" *ngIf="isLoggedIn()">
      <div class="search-bar-mobile">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          class="search-input-mobile"
          placeholder="Search tasks..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
          (keyup.enter)="handleSearch()"
          aria-label="Search tasks">
      </div>
    </div>

    <div class="mobile-menu-content">
      <!-- Logged in mobile menu -->
      <template *ngIf="isLoggedIn()">
        <a routerLink="/dashboard"
           routerLinkActive="active"
           role="menuitem"
           class="mobile-nav-link"
           (click)="closeMenu()">
          <span class="nav-icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a routerLink="/tasks"
           routerLinkActive="active"
           role="menuitem"
           class="mobile-nav-link"
           (click)="closeMenu()">
          <span class="nav-icon">✓</span>
          <span>Tasks</span>
        </a>
        <hr class="menu-divider" />
        <button class="logout-btn mobile-logout"
                role="menuitem"
                (click)="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>Logout</span>
        </button>
      </template>

      <!-- Not logged in mobile menu -->
      <template *ngIf="!isLoggedIn()">
        <a routerLink="/login"
           role="menuitem"
           class="mobile-auth-link sign-in"
           (click)="closeMenu()">
          Sign In
        </a>
        <a routerLink="/register"
           role="menuitem"
           class="mobile-auth-link sign-up"
           (click)="closeMenu()">
          Sign Up
        </a>
      </template>
    </div>
  </div>

  <!-- MOBILE SEARCH OVERLAY -->
  <div class="search-overlay" [class.active]="searchActive()" *ngIf="isLoggedIn()"></div>
</nav>
